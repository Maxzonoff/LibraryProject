{% extends "library/base.html" %}

{% block title %}Детали автора{% endblock %}

{% block content %}
{% include "library/header.html" %}
<h2>{{ author.first_name }}</h2>
<p>Автор: {{ author.first_name }} {{ author.last_name }}</p>
<a href="{% url 'library:author_update' book.pk %}" class="btn btn-secondary">Редактировать</a>
<a href="{% url 'library:author_delete' book.pk %}" class="btn btn-danger">Удалить</a>
<a href="{% url 'library:author_list' %}" class="btn btn-primary">Вернуться к списку</a>
{% endblock %}
